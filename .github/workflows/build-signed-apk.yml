name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.1"
  ANDROID_VERSION_CODE_OFFSET: "100000"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK and AAB
    needs: [analyze, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve Android version code
        id: android_version
        run: echo "version_code=$((ANDROID_VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: flutter build apk --release --build-number "${{ steps.android_version.outputs.version_code }}"

      - name: Build release AAB
        run: flutter build appbundle --release --build-number "${{ steps.android_version.outputs.version_code }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-universe-decides-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-universe-decides-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          VERSION_CODE=$((ANDROID_VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))
          TAG="v${VERSION_NAME}+${VERSION_CODE}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: the-universe-decides-apk
          path: dist

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: the-universe-decides-aab
          path: dist

      - name: Rename release artifacts
        run: |
          mv dist/app-release.apk "dist/the-universe-decides-${{ steps.version.outputs.tag }}.apk"
          mv dist/app-release.aab "dist/the-universe-decides-${{ steps.version.outputs.tag }}.aab"

      - name: Extract changelog for this release
        run: |
          NOTES_FILE="dist/release-notes.md"
          awk '/^## Unreleased/{flag=1; next} /^## /{flag=0} flag' CHANGELOG.md > "$NOTES_FILE" || true
          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "No CHANGELOG.md '## Unreleased' entry found; falling back to a minimal note." >&2
            echo "See CHANGELOG.md for release notes." > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
        id: changelog

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            dist/the-universe-decides-${{ steps.version.outputs.tag }}.apk
            dist/the-universe-decides-${{ steps.version.outputs.tag }}.aab
